<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mini Sudoku</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:#f4f3ef;
}

.app{
  max-width:430px;
  margin:auto;
  min-height:100vh;
  background:#faf9f6;
  padding:18px 16px;
  display:flex;
  flex-direction:column;
}

.header{
  text-align:center;
  font-size:28px;
  font-weight:800;
  letter-spacing:-.5px;
  margin-bottom:16px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:18px;
}

.timerBox,
.newgame{
  flex:1;
  height:44px;
  border-radius:16px;
  background:#fff;
  border:1px solid #e5e1da;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:17px;
  font-weight:700;
  color:#222;
}

.newgame{
  color:#111;
  cursor:pointer;
}

.board-wrap{
  padding:10px;
  border-radius:22px;
  background:#fff;
  border:1px solid #e4e0d8;
}

.board{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  aspect-ratio:1;
  border:3px solid #333;
  border-radius:10px;
  overflow:hidden;
  background:#333;
  gap:1px;
}

.cell{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  font-weight:800;
  background:#fffdf9;
  user-select:none;
  transition:background .16s ease, box-shadow .16s ease;
}

.cell:nth-child(3n){border-right:3px solid #333}
.cell:nth-child(6n){border-right:none}

.cell:nth-child(n+13):nth-child(-n+18),
.cell:nth-child(n+25):nth-child(-n+30){
  border-top:3px solid #333;
}

.given{
  color:#a0a0a0;
}

.user{
  color:#161616;
}

.related{
  background:#f1f6fb;
}

.selected{
  background:#dcecff!important;
  box-shadow:inset 0 0 0 3px #7db8f5;
}

.completed{
  background:#dcf7d9!important;
  animation:softComplete .22s ease;
}

@keyframes softComplete{
  from{background:#c9f2c4}
  to{background:#dcf7d9}
}

.blink-error{
  animation:errorSoft .42s ease 2;
}

@keyframes errorSoft{
  0%{box-shadow:inset 0 0 0 0 rgba(229,57,53,0)}
  50%{background:#ffe8e8; box-shadow:inset 0 0 0 3px rgba(229,57,53,.55)}
  100%{box-shadow:inset 0 0 0 0 rgba(229,57,53,0)}
}

.tools{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:14px 0 12px;
}

.tool{
  height:44px;
  border-radius:14px;
  background:#edeae3;
  color:#666;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  font-weight:700;
}

.tool.active{
  background:#222;
  color:#fff;
}

.keypad{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

button{
  height:56px;
  border:none;
  border-radius:16px;
  background:#fff;
  border:1px solid #e5e1da;
  font-size:28px;
  font-weight:800;
  color:#0a84ff;
}

button:active,
.newgame:active,
.tool:active{
  transform:scale(.98);
}

.small{
  font-size:15px;
  color:#555;
  line-height:1.1;
}

.msg{
  min-height:26px;
  text-align:center;
  margin-top:10px;
  font-size:18px;
  font-weight:800;
  color:#18a058;
}

@media (max-height:740px){
  .header{font-size:24px;margin-bottom:10px}
  .topbar{margin-bottom:12px}
  .board-wrap{padding:8px}
  .cell{font-size:29px}
  button{height:50px}
  .tool{height:40px}
}
</style>
</head>

<body>
<div class="app">

  <div class="header">Mini Sudoku</div>

  <div class="topbar">
    <div class="timerBox">⏱ <span id="timer">0:00</span></div>
    <div class="newgame" onclick="newGame()">🎲 ด่านใหม่</div>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>

  <div class="tools">
    <div class="tool" onclick="hint()">💡 คำใบ้</div>
    <div class="tool" id="noteBtn" onclick="toggleNote()">✎ Note ปิด</div>
  </div>

  <div class="keypad">
    <button onclick="pressNum(1)">1</button>
    <button onclick="pressNum(2)">2</button>
    <button onclick="pressNum(3)">3</button>
    <button class="small" onclick="erase()">✕<br>ลบ</button>

    <button onclick="pressNum(4)">4</button>
    <button onclick="pressNum(5)">5</button>
    <button onclick="pressNum(6)">6</button>
    <button class="small" onclick="undo()">↶<br>เลิกทำ</button>
  </div>

  <div class="msg" id="msg"></div>

</div>

<script>
const puzzles = [
  {
    p:[0,1,2,3,0,0, 0,4,0,0,0,0, 0,5,0,0,0,0, 0,0,0,0,2,0, 0,0,0,0,5,0, 0,0,1,2,3,0],
    s:[6,1,2,3,4,5, 3,4,5,1,6,2, 2,5,6,4,1,3, 1,3,4,5,2,6, 4,2,3,6,5,1, 5,6,1,2,3,4]
  },
  {
    p:[6,0,0,0,0,5, 0,0,5,0,6,0, 0,0,6,4,0,0, 0,3,0,5,0,0, 0,0,3,6,0,0, 5,0,0,0,0,4],
    s:[6,1,2,3,4,5, 3,4,5,1,6,2, 2,5,6,4,1,3, 1,3,4,5,2,6, 4,2,3,6,5,1, 5,6,1,2,3,4]
  },
  {
    p:[0,0,2,0,0,5, 0,4,0,0,6,0, 2,0,0,4,0,0, 0,0,4,0,2,0, 4,0,0,0,0,1, 0,6,0,2,0,0],
    s:[6,1,2,3,4,5, 3,4,5,1,6,2, 2,5,6,4,1,3, 1,3,4,5,2,6, 4,2,3,6,5,1, 5,6,1,2,3,4]
  }
];

let puzzle, board, solution;
let selected = null;
let history = [];
let noteMode = false;
let seconds = 0;
let timer = null;
let finished = false;

function vibrate(ms=12){
  if(navigator.vibrate) navigator.vibrate(ms);
}

function newGame(){
  puzzle = puzzles[Math.floor(Math.random() * puzzles.length)];
  board = [...puzzle.p];
  solution = [...puzzle.s];
  history = [];
  selected = null;
  seconds = 0;
  finished = false;

  document.getElementById("timer").textContent = "0:00";
  document.getElementById("msg").textContent = "";

  clearInterval(timer);
  timer = setInterval(tick,1000);

  render();
  vibrate(10);
}

function tick(){
  if(finished) return;
  seconds++;

  const m = Math.floor(seconds / 60);
  const s = seconds % 60;

  document.getElementById("timer").textContent =
    `${m}:${String(s).padStart(2,"0")}`;
}

function render(){
  const boardEl = document.getElementById("board");
  boardEl.innerHTML = "";

  board.forEach((value,index)=>{
    const cell = document.createElement("div");
    cell.className = "cell";

    if(value) cell.textContent = value;

    if(puzzle.p[index] !== 0){
      cell.classList.add("given");
    }else{
      cell.classList.add("user");
    }

    cell.onclick = () => selectCell(index);
    boardEl.appendChild(cell);
  });

  applyHighlight();
  markCompletedLines();
}

function selectCell(index){
  selected = index;
  render();
}

function saveHistory(){
  history.push([...board]);
}

function pressNum(num){
  if(selected === null || finished) return;
  if(puzzle.p[selected] !== 0) return;

  saveHistory();
  board[selected] = num;

  render();
  checkConflicts();
  checkFinish();
  vibrate(8);
}

function erase(){
  if(selected === null || finished) return;
  if(puzzle.p[selected] !== 0) return;

  saveHistory();
  board[selected] = 0;

  render();
  checkConflicts();
  vibrate(8);
}

function undo(){
  if(history.length === 0 || finished) return;

  board = history.pop();
  render();
  checkConflicts();
  vibrate(8);
}

function toggleNote(){
  noteMode = !noteMode;

  const btn = document.getElementById("noteBtn");
  btn.textContent = noteMode ? "✎ Note เปิด" : "✎ Note ปิด";
  btn.classList.toggle("active", noteMode);
}

function hint(){
  if(finished) return;

  const available = board
    .map((value,index)=> value !== solution[index] && puzzle.p[index] === 0 ? index : null)
    .filter(index => index !== null);

  if(available.length === 0) return;

  saveHistory();

  const pick = available[Math.floor(Math.random() * available.length)];
  board[pick] = solution[pick];
  selected = pick;

  render();
  checkFinish();
  vibrate(18);
}

function applyHighlight(){
  const cells = document.querySelectorAll(".cell");

  if(selected === null) return;

  const selectedRow = Math.floor(selected / 6);
  const selectedCol = selected % 6;
  const selectedBoxRow = Math.floor(selectedRow / 2);
  const selectedBoxCol = Math.floor(selectedCol / 3);
  const selectedValue = board[selected];

  cells.forEach((cell,index)=>{
    const row = Math.floor(index / 6);
    const col = index % 6;
    const boxRow = Math.floor(row / 2);
    const boxCol = Math.floor(col / 3);

    if(
      row === selectedRow ||
      col === selectedCol ||
      (boxRow === selectedBoxRow && boxCol === selectedBoxCol) ||
      (selectedValue && board[index] === selectedValue)
    ){
      cell.classList.add("related");
    }
  });

  cells[selected].classList.add("selected");
}

function markCompletedLines(){
  const cells = document.querySelectorAll(".cell");

  for(let row=0; row<6; row++){
    let correct = true;
    for(let col=0; col<6; col++){
      const index = row * 6 + col;
      if(board[index] !== solution[index]) correct = false;
    }

    if(correct){
      for(let col=0; col<6; col++){
        cells[row * 6 + col].classList.add("completed");
      }
    }
  }

  for(let col=0; col<6; col++){
    let correct = true;
    for(let row=0; row<6; row++){
      const index = row * 6 + col;
      if(board[index] !== solution[index]) correct = false;
    }

    if(correct){
      for(let row=0; row<6; row++){
        cells[row * 6 + col].classList.add("completed");
      }
    }
  }

  for(let blockRow=0; blockRow<3; blockRow++){
    for(let blockCol=0; blockCol<2; blockCol++){
      let correct = true;
      let blockCells = [];

      for(let r=0; r<2; r++){
        for(let c=0; c<3; c++){
          const row = blockRow * 2 + r;
          const col = blockCol * 3 + c;
          const index = row * 6 + col;

          blockCells.push(index);

          if(board[index] !== solution[index]) correct = false;
        }
      }

      if(correct){
        blockCells.forEach(index=>{
          cells[index].classList.add("completed");
        });
      }
    }
  }
}

function checkConflicts(){
  const cells = document.querySelectorAll(".cell");

  const blinkCells = (indices)=>{
    indices.forEach(i=>{
      const el = cells[i];
      el.classList.remove("blink-error");
      void el.offsetWidth;
      el.classList.add("blink-error");
    });
  };

  const checkGroup = (indices)=>{
    const seen = {};

    indices.forEach(i=>{
      const v = board[i];
      if(!v) return;

      if(!seen[v]) seen[v] = [];
      seen[v].push(i);
    });

    Object.values(seen).forEach(group=>{
      if(group.length > 1) blinkCells(group);
    });
  };

  for(let row=0; row<6; row++){
    checkGroup(Array.from({length:6},(_,col)=>row*6+col));
  }

  for(let col=0; col<6; col++){
    checkGroup(Array.from({length:6},(_,row)=>row*6+col));
  }

  for(let blockRow=0; blockRow<3; blockRow++){
    for(let blockCol=0; blockCol<2; blockCol++){
      const block = [];

      for(let r=0; r<2; r++){
        for(let c=0; c<3; c++){
          const row = blockRow * 2 + r;
          const col = blockCol * 3 + c;
          block.push(row * 6 + col);
        }
      }

      checkGroup(block);
    }
  }
}

function checkFinish(){
  const complete = board.every((value,index)=>value === solution[index]);

  if(complete){
    finished = true;
    clearInterval(timer);
    document.getElementById("msg").textContent = "🎉 สำเร็จแล้ว!";
    vibrate(60);
  }
}

newGame();
</script>

</body>
</html>
